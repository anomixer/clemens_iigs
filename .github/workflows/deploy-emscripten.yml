name: Deploy Emscripten

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Restore ROM from secret
        # The Apple IIgs ROM 3 is NOT included in the repository (copyright).
        # Store a base64-encoded copy as the GitHub Secret: IIGS_ROM_V3_BASE64
        # Encode locally with:  base64 -w 0 rom.v3 > rom_b64.txt
        # Then paste the contents as the secret value in your repo settings.
        run: |
          mkdir -p rom
          if [ -z "${{ secrets.IIGS_ROM_V3_BASE64 }}" ]; then
            echo "::error::Secret IIGS_ROM_V3_BASE64 is not set."
            echo "::error::The Apple IIgs ROM 3 is required for the Emscripten build."
            echo "::error::Please add the base64-encoded ROM as a repository secret named IIGS_ROM_V3_BASE64."
            exit 1
          fi
          echo "${{ secrets.IIGS_ROM_V3_BASE64 }}" | base64 -d > rom/rom.v3
          echo "ROM restored successfully ($(wc -c < rom/rom.v3) bytes)"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51
          actions-cache-folder: 'emsdk-cache'

      - name: Install Ninja
        run: sudo apt-get install ninja-build

      - name: Build
        run: |
          mkdir -p build-em
          cd build-em
          emcmake cmake .. -G Ninja -DEMSCRIPTEN=1 -DCMAKE_BUILD_TYPE=Release \
            -DCLEMENS_ROM_PATH="${GITHUB_WORKSPACE}/rom/rom.v3"
          cmake --build .

      - name: Prepare Deployment
        run: |
          cd build-em/host
          cp clemens_iigs.html index.html
          # Ensure coi-serviceworker is there if CMake copy failed or path differs
          if [ -f "coi-serviceworker.js" ]; then
            echo "coi-serviceworker.js exists"
          else
            echo "Downloading coi-serviceworker.js as fallback"
            curl -o coi-serviceworker.js https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          fi
          echo "Prepared index.html for deployment"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build-em/host
          force_orphan: true
