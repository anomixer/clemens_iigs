name: Deploy Emscripten

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Restore ROM from secrets
        # The Apple IIgs ROM 3 is NOT included in the repository (copyright).
        # The ROM (262144 bytes) is stored as 6 base64-encoded GitHub Secrets because
        # GitHub's per-secret limit is 64KB and the full base64 is ~349KB.
        #
        # To set these secrets, run from the project root (Windows):
        #   powershell -ExecutionPolicy Bypass -File tools\split_rom_secret.ps1
        # Then add each generated tools\rom_secret_partN.txt as a secret:
        #   IIGS_ROM_V3_BASE64_1 ... IIGS_ROM_V3_BASE64_6
        run: |
          mkdir -p rom
          if [ -z "${{ secrets.IIGS_ROM_V3_BASE64_1 }}" ]; then
            echo "::error::Secret IIGS_ROM_V3_BASE64_1 is not set."
            echo "::error::Run tools/split_rom_secret.ps1 and add the 6 generated secrets to your repo."
            exit 1
          fi
          printf '%s%s%s%s%s%s' \
            "${{ secrets.IIGS_ROM_V3_BASE64_1 }}" \
            "${{ secrets.IIGS_ROM_V3_BASE64_2 }}" \
            "${{ secrets.IIGS_ROM_V3_BASE64_3 }}" \
            "${{ secrets.IIGS_ROM_V3_BASE64_4 }}" \
            "${{ secrets.IIGS_ROM_V3_BASE64_5 }}" \
            "${{ secrets.IIGS_ROM_V3_BASE64_6 }}" \
            | base64 -d > rom/rom.v3
          echo "ROM restored: $(wc -c < rom/rom.v3) bytes"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51
          actions-cache-folder: 'emsdk-cache'

      - name: Install Ninja
        run: sudo apt-get install ninja-build

      - name: Build
        run: |
          mkdir -p build-em
          cd build-em
          emcmake cmake .. -G Ninja -DEMSCRIPTEN=1 -DCMAKE_BUILD_TYPE=Release \
            -DCLEMENS_ROM_PATH="${GITHUB_WORKSPACE}/rom/rom.v3"
          cmake --build .

      - name: Prepare Deployment
        run: |
          cd build-em/host
          cp clemens_iigs.html index.html
          if [ -f "coi-serviceworker.js" ]; then
            echo "coi-serviceworker.js exists"
          else
            echo "Downloading coi-serviceworker.js as fallback"
            curl -o coi-serviceworker.js https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          fi
          echo "Prepared index.html for deployment"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build-em/host
          force_orphan: true
